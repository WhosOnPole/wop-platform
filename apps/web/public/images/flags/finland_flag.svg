<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 500 500">
  <defs>
    <clipPath id="clipCircle">
      <circle cx="250" cy="250" r="250"/>
    </clipPath>
  </defs>

  <!-- Circular Finland flag (fills the full circle) -->
  <g clip-path="url(#clipCircle)">
    <!-- Scale the 18:11 flag so its HEIGHT = 500, then center horizontally (will crop left/right inside the circle) -->
    <g transform="translate(-159.0909091, 0) scale(45.45454545)">
      <!-- Base -->
      <rect x="0" y="0" width="18" height="11" fill="#FFFFFF"/>
      <!-- Nordic cross (Finland blue) -->
      <rect x="0" y="4" width="18" height="3" fill="#003580"/>
      <rect x="5" y="0" width="3" height="11" fill="#003580"/>
    </g>
  </g>
</svg>
